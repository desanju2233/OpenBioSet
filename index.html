<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBioSet Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <div id="sidebar-backdrop" onclick="toggleSidebar(false)" 
         class="fixed inset-0 bg-black/50 z-40 hidden opacity-0 transition-opacity duration-300 backdrop-blur-sm"></div>

    <aside id="sidebar-drawer" 
           class="fixed inset-y-0 left-0 z-50 w-[85vw] max-w-sm sm:w-80 bg-white shadow-2xl transform -translate-x-full transition-transform duration-300 flex flex-col">
        
        <div class="p-4 sm:p-5 border-b flex items-center justify-between bg-gray-50/50">
            <div class="flex items-center gap-2">
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider">Available Protocols</h2>
                <span id="protocol-count" class="text-xs bg-blue-100 text-blue-600 font-bold px-2 py-0.5 rounded-full">0</span>
            </div>
            <button onclick="toggleSidebar(false)" class="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <div class="p-3 sm:p-4 flex-1 overflow-y-auto">
            <ul id="sidebar-list" class="space-y-1">
                <li class="text-sm text-gray-400 italic py-2">Loading protocols...</li>
            </ul>
        </div>
    </aside>
    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <header class="mb-6 sm:mb-8">
            <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight text-blue-600">OpenBioSet</h1>
            <p class="text-xs sm:text-sm text-gray-500 mt-0.5">Dataset Explorer</p>
        </header>

        <div class="flex items-center gap-2 sm:gap-3 mb-6">
            
            <button onclick="toggleSidebar(true)" title="Open Protocols Menu"
                    class="p-2.5 sm:p-3 rounded-lg bg-white border border-gray-300 shadow-sm hover:bg-gray-50 text-gray-600 transition focus:outline-none focus:ring-2 focus:ring-blue-500 shrink-0">
                <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                </svg>
            </button>

            <div class="relative flex-1">
                <input type="text" id="search" oninput="filterFolders()" autocomplete="off"
                       placeholder="Search folders..." 
                       class="w-full px-3 sm:px-4 py-2.5 sm:py-3 text-sm sm:text-base rounded-lg border border-gray-300 shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                
                <ul id="recommendations" class="absolute z-10 w-full bg-white mt-1 rounded-lg shadow-lg border border-gray-200 max-h-48 sm:max-h-60 overflow-y-auto empty:hidden text-sm sm:text-base"></ul>
            </div>

        </div>

        <main id="content-view" class="hidden space-y-4 sm:space-y-6">
            <h2 id="folder-title" class="text-lg sm:text-xl font-bold text-gray-800 border-b pb-2 truncate"></h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6 items-start">
                
                <div class="bg-white p-4 sm:p-5 rounded-xl border border-gray-200 shadow-sm w-full overflow-hidden">
                    <h3 class="text-xs sm:text-sm font-semibold uppercase text-gray-400 mb-2">description (.txt)</h3>
                    <pre id="txt-content" class="bg-gray-50 p-3 sm:p-4 rounded-lg overflow-x-auto text-xs sm:text-sm text-gray-700 font-mono border border-gray-100 whitespace-pre-wrap">Loading...</pre>
                </div>

                <div class="bg-white p-4 sm:p-5 rounded-xl border border-gray-200 shadow-sm w-full overflow-hidden">
                    <h3 class="text-xs sm:text-sm font-semibold uppercase text-gray-400 mb-2">layout</h3>
                    <div class="bg-gray-50 rounded-lg p-3 sm:p-4 flex justify-center border border-gray-100 min-h-[12rem] sm:min-h-[16rem] items-center">
                        <img id="img-content" class="max-h-72 sm:max-h-96 w-auto rounded object-contain" alt="Folder visual representation" />
                    </div>
                </div>

                <div class="bg-white p-4 sm:p-5 rounded-xl border border-gray-200 shadow-sm w-full overflow-hidden md:col-span-2 lg:col-span-1">
                    <h3 class="text-xs sm:text-sm font-semibold uppercase text-gray-400 mb-2">output (.ir)</h3>
                    <pre id="ir-content" class="bg-gray-50 p-3 sm:p-4 rounded-lg overflow-x-auto text-xs sm:text-sm text-gray-700 font-mono border border-gray-100 whitespace-pre-wrap">Loading...</pre>
                </div>
                
            </div>
        </main>

    </div>

    <script>
        let allFolders = [];

        async function init() {
            const searchBar = document.getElementById('search');
            const sidebarList = document.getElementById('sidebar-list');
            const countBadge = document.getElementById('protocol-count');

            try {
                const response = await fetch('./Dataset/folders.json');
                if (!response.ok) throw new Error("folders.json not found");
                
                allFolders = await response.json();
                allFolders.sort();
                
                searchBar.placeholder = `Search ${allFolders.length} folders...`;
                countBadge.textContent = allFolders.length;

                sidebarList.innerHTML = ''; 
                allFolders.forEach(name => {
                    const li = document.createElement('li');
                    li.textContent = name;
                    li.id = `drawer-${name}`;
                    li.className = "drawer-item text-xs sm:text-sm px-3 py-2 sm:py-2.5 rounded-lg cursor-pointer hover:bg-blue-50 hover:text-blue-600 transition text-gray-700 block truncate";
                    li.onclick = () => loadFiles(name);
                    sidebarList.appendChild(li);
                });

            } catch (error) {
                console.error("Error loading folders:", error);
                searchBar.placeholder = "Error: folders.json not found!";
            }
        }

        function toggleSidebar(show) {
            const drawer = document.getElementById('sidebar-drawer');
            const backdrop = document.getElementById('sidebar-backdrop');

            if (show) {
                backdrop.classList.remove('hidden');
                setTimeout(() => backdrop.classList.remove('opacity-0'), 10);
                drawer.classList.remove('-translate-x-full');
            } else {
                backdrop.classList.add('opacity-0');
                drawer.classList.add('-translate-x-full');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }

        function filterFolders() {
            const query = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('recommendations');
            list.innerHTML = ''; 

            if (!query) return; 

            const matches = allFolders.filter(name => name.toLowerCase().includes(query));
            
            matches.forEach(name => {
                const li = document.createElement('li');
                li.textContent = name;
                li.className = "px-3 sm:px-4 py-2 cursor-pointer hover:bg-gray-100 border-b border-gray-100 last:border-none truncate";
                li.onclick = () => loadFiles(name);
                list.appendChild(li);
            });
        }

        async function loadFiles(folderName) {
            document.getElementById('search').value = folderName;
            document.getElementById('recommendations').innerHTML = ''; 
            document.getElementById('content-view').classList.remove('hidden');
            document.getElementById('folder-title').textContent = folderName;
            
            toggleSidebar(false);

            document.querySelectorAll('.drawer-item').forEach(item => {
                item.className = "drawer-item text-xs sm:text-sm px-3 py-2 sm:py-2.5 rounded-lg cursor-pointer hover:bg-blue-50 hover:text-blue-600 transition text-gray-700 block truncate";
            });
            const activeDrawerItem = document.getElementById(`drawer-${folderName}`);
            if (activeDrawerItem) {
                activeDrawerItem.className = "drawer-item text-xs sm:text-sm px-3 py-2 sm:py-2.5 rounded-lg cursor-pointer bg-blue-600 text-white font-medium shadow-sm block truncate";
            }

            document.getElementById('txt-content').textContent = 'Loading text...';
            document.getElementById('img-content').src = '';
            document.getElementById('img-content').style.display = 'none'; 
            document.getElementById('ir-content').textContent = 'Loading routing...';

            try {
                const txtRes = await fetch(`./Dataset/${folderName}/description.txt`);
                document.getElementById('txt-content').textContent = txtRes.ok 
                    ? await txtRes.text() 
                    : `Error: Could not find description.txt`;

                const irRes = await fetch(`./Dataset/${folderName}/output.ir`);
                document.getElementById('ir-content').textContent = irRes.ok 
                    ? await irRes.text() 
                    : `Error: Could not find output.ir`;

                const imgEl = document.getElementById('img-content');
                const extensions = ['.jpg', '.png', '.jpeg'];
                
                const tryLoadImage = (index) => {
                    if (index >= extensions.length) {
                        imgEl.style.display = 'none';
                        return;
                    }
                    imgEl.src = `./Dataset/${folderName}/layout${extensions[index]}`;
                    imgEl.onload = () => { imgEl.style.display = 'block'; }; 
                    imgEl.onerror = () => tryLoadImage(index + 1); 
                };

                tryLoadImage(0);

            } catch (error) {
                console.error("Error fetching local files:", error);
            }
        }

        init();
    </script>
</body>
</html>
