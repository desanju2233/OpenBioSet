<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBioSet Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Prevents accidental text selection while dragging resizers */
        .resizing {
            user-select: none;
            cursor: col-resize !important;
        }
        .resizing * {
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased selection:bg-blue-100 selection:text-blue-700">

    <div id="sidebar-backdrop" onclick="toggleSidebar(false)" 
         class="fixed inset-0 bg-black/50 z-40 hidden opacity-0 transition-opacity duration-300 backdrop-blur-sm"></div>

    <aside id="sidebar-drawer" 
           class="fixed inset-y-0 left-0 z-50 w-[85vw] max-w-sm sm:w-80 bg-white shadow-2xl transform -translate-x-full transition-transform duration-300 flex flex-col">
        
        <div class="p-4 sm:p-5 border-b flex items-center justify-between bg-gray-50/50">
            <div class="flex items-center gap-2">
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wider">Available Protocols</h2>
                <span id="protocol-count" class="text-xs bg-blue-100 text-blue-600 font-bold px-2 py-0.5 rounded-full">0</span>
            </div>
            <button onclick="toggleSidebar(false)" class="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <div class="p-3 sm:p-4 flex-1 overflow-y-auto">
            <ul id="sidebar-list" class="space-y-1">
                <li class="text-sm text-gray-400 italic py-2">Scanning repository...</li>
            </ul>
        </div>
    </aside>

    <div class="w-full px-4 sm:px-8 xl:px-16 2xl:px-24 py-6 transition-all duration-300">
        
        <header class="mb-6 sm:mb-8 flex flex-col sm:flex-row sm:items-baseline justify-between gap-2">
            <div>
                <h1 class="text-2xl sm:text-3xl lg:text-4xl font-extrabold tracking-tight text-blue-600">OpenBioSet</h1>
                <p class="text-xs sm:text-sm text-gray-500 mt-0.5">Universal Bio Protocol Explorer</p>
            </div>
        </header>

        <div class="flex items-center gap-2 sm:gap-3 mb-6 sm:mb-8">
            <button onclick="toggleSidebar(true)" title="Open Protocols Menu"
                    class="p-2.5 sm:p-3 rounded-lg bg-white border border-gray-300 shadow-sm hover:bg-gray-50 text-gray-600 transition focus:outline-none focus:ring-2 focus:ring-blue-500 shrink-0">
                <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                </svg>
            </button>

            <div class="relative flex-1">
                <input type="text" id="search" oninput="filterFolders()" autocomplete="off"
                       placeholder="Connecting to GitHub API..." 
                       class="w-full px-3 sm:px-4 py-2.5 sm:py-3 text-sm sm:text-base rounded-lg border border-gray-300 shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                
                <ul id="recommendations" class="absolute z-10 w-full bg-white mt-1 rounded-lg shadow-lg border border-gray-200 max-h-48 sm:max-h-60 overflow-y-auto empty:hidden text-sm sm:text-base"></ul>
            </div>
        </div>

        <main id="content-view" class="hidden space-y-4 sm:space-y-6">
            <h2 id="folder-title" class="text-xl sm:text-2xl font-bold text-gray-800 border-b pb-3 truncate"></h2>
            
            <div id="resizable-grid" class="grid grid-cols-1 lg:grid-cols-[1fr_12px_auto_12px_1fr] gap-y-6 items-start w-full">
                
                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm w-full min-w-[180px] overflow-hidden flex flex-col h-[65vh] xl:h-[75vh]">
                    <h3 class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-3 shrink-0">description (.txt)</h3>
                    <pre id="txt-content" class="bg-gray-50 p-4 rounded-lg overflow-y-auto text-xs sm:text-sm text-gray-700 font-mono border border-gray-100 whitespace-pre-wrap break-words flex-1">Loading...</pre>
                </div>

                <div id="resizer-left" class="hidden lg:flex items-center justify-center w-3 h-[75vh] cursor-col-resize group px-1">
                    <div class="w-1 h-16 rounded-full bg-gray-200 group-hover:bg-blue-500 group-hover:scale-x-150 transition-all duration-150"></div>
                </div>

                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm w-full lg:w-auto lg:max-w-[55vw] min-w-[200px] overflow-hidden flex flex-col h-[65vh] xl:h-[75vh] justify-self-center">
                    <h3 class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-3 shrink-0">visual layout</h3>
                    <div class="bg-gray-50 rounded-lg p-4 flex justify-center items-center border border-gray-100 flex-1 overflow-hidden min-h-[16rem]">
                        <img id="img-content" class="max-h-full max-w-full w-auto h-auto object-contain mx-auto block" alt="Graph layout" />
                    </div>
                </div>

                <div id="resizer-right" class="hidden lg:flex items-center justify-center w-3 h-[75vh] cursor-col-resize group px-1">
                    <div class="w-1 h-16 rounded-full bg-gray-200 group-hover:bg-blue-500 group-hover:scale-x-150 transition-all duration-150"></div>
                </div>

                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm w-full min-w-[180px] overflow-hidden flex flex-col h-[65vh] xl:h-[75vh]">
                    <h3 class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-3 shrink-0">output (.ir)</h3>
                    <pre id="ir-content" class="bg-gray-50 p-4 rounded-lg overflow-y-auto text-xs sm:text-sm text-gray-700 font-mono border border-gray-100 whitespace-pre-wrap break-words flex-1">Loading...</pre>
                </div>
                
            </div>
        </main>

    </div>

    <script>
        const owner = 'desanju2233'; 
        const repo = 'OpenBioSet';            
        const apiEndpoint = `https://api.github.com/repos/${owner}/${repo}/contents/Dataset`;
        
        let allFolders = [];

        async function init() {
            const searchBar = document.getElementById('search');
            const sidebarList = document.getElementById('sidebar-list');
            const countBadge = document.getElementById('protocol-count');

            try {
                const response = await fetch(apiEndpoint);
                if (!response.ok) throw new Error("GitHub API request failed");
                
                const data = await response.json();
                
                allFolders = data
                    .filter(item => item.type === 'dir')
                    .map(item => item.name)
                    .sort();
                
                searchBar.placeholder = `Search ${allFolders.length} folders...`;
                countBadge.textContent = allFolders.length;

                sidebarList.innerHTML = ''; 
                allFolders.forEach(name => {
                    const li = document.createElement('li');
                    li.textContent = name;
                    li.id = `drawer-${name}`;
                    li.className = "drawer-item text-xs sm:text-sm px-3 py-2 sm:py-2.5 rounded-lg cursor-pointer hover:bg-blue-50 hover:text-blue-600 transition text-gray-700 block truncate";
                    li.onclick = () => loadFiles(name);
                    sidebarList.appendChild(li);
                });

            } catch (error) {
                console.error("Error connecting to repository:", error);
                searchBar.placeholder = "Error reading repository. Rate limit exceeded?";
                sidebarList.innerHTML = `<li class="text-xs text-red-500 py-2">Could not fetch directories from GitHub API.</li>`;
            }
        }

        function toggleSidebar(show) {
            const drawer = document.getElementById('sidebar-drawer');
            const backdrop = document.getElementById('sidebar-backdrop');

            if (show) {
                backdrop.classList.remove('hidden');
                setTimeout(() => backdrop.classList.remove('opacity-0'), 10);
                drawer.classList.remove('-translate-x-full');
            } else {
                backdrop.classList.add('opacity-0');
                drawer.classList.add('-translate-x-full');
                setTimeout(() => backdrop.classList.add('hidden'), 300);
            }
        }

        function filterFolders() {
            const query = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('recommendations');
            list.innerHTML = ''; 

            if (!query) return; 

            const matches = allFolders.filter(name => name.toLowerCase().includes(query));
            
            matches.forEach(name => {
                const li = document.createElement('li');
                li.textContent = name;
                li.className = "px-3 sm:px-4 py-2 cursor-pointer hover:bg-gray-100 border-b border-gray-100 last:border-none truncate text-sm sm:text-base";
                li.onclick = () => loadFiles(name);
                list.appendChild(li);
            });
        }

        async function loadFiles(folderName) {
            document.getElementById('search').value = folderName;
            document.getElementById('recommendations').innerHTML = ''; 
            document.getElementById('content-view').classList.remove('hidden');
            document.getElementById('folder-title').textContent = folderName;
            
            // RESET MECHANIC: Clear manually dragged inline grid widths so new images auto-fit
            document.getElementById('resizable-grid').style.gridTemplateColumns = '';

            toggleSidebar(false);

            document.querySelectorAll('.drawer-item').forEach(item => {
                item.className = "drawer-item text-xs sm:text-sm px-3 py-2 sm:py-2.5 rounded-lg cursor-pointer hover:bg-blue-50 hover:text-blue-600 transition text-gray-700 block truncate";
            });
            const activeDrawerItem = document.getElementById(`drawer-${folderName}`);
            if (activeDrawerItem) {
                activeDrawerItem.className = "drawer-item text-xs sm:text-sm px-3 py-2 sm:py-2.5 rounded-lg cursor-pointer bg-blue-600 text-white font-medium shadow-sm block truncate";
            }

            document.getElementById('txt-content').textContent = 'Fetching text...';
            document.getElementById('img-content').src = '';
            document.getElementById('img-content').style.display = 'none'; 
            document.getElementById('ir-content').textContent = 'Fetching routing...';

            try {
                const folderEndpoint = `${apiEndpoint}/${folderName}`;
                const response = await fetch(folderEndpoint);
                const files = await response.json();

                files.forEach(async file => {
                    if (file.name.endsWith('.txt')) {
                        const res = await fetch(file.download_url);
                        document.getElementById('txt-content').textContent = await res.text();
                    } 
                    else if (file.name.endsWith('.ir')) {
                        const res = await fetch(file.download_url);
                        document.getElementById('ir-content').textContent = await res.text();
                    } 
                    else if (file.name.match(/\.(jpg|jpeg|png|gif)$/i)) {
                        document.getElementById('img-content').src = file.download_url;
                        document.getElementById('img-content').style.display = 'block';
                    }
                });

            } catch (error) {
                console.error("Error retrieving target files:", error);
                document.getElementById('txt-content').textContent = "Error loading folder contents.";
                document.getElementById('ir-content').textContent = "Error loading folder contents.";
            }
        }

        // --- DRAGGABLE RESIZE ENGINE ---
        function initResizers() {
            const grid = document.getElementById('resizable-grid');
            const resizerLeft = document.getElementById('resizer-left');
            const resizerRight = document.getElementById('resizer-right');

            let isResizing = false;
            let currentResizer = null;

            const startResize = (e, resizer) => {
                if (window.innerWidth < 1024) return;
                
                isResizing = true;
                currentResizer = resizer;
                document.body.classList.add('resizing');
                e.preventDefault();
            };

            resizerLeft.addEventListener('mousedown', (e) => startResize(e, 'left'));
            resizerRight.addEventListener('mousedown', (e) => startResize(e, 'right'));

            window.addEventListener('mousemove', (e) => {
                if (!isResizing) return;

                const cols = window.getComputedStyle(grid).gridTemplateColumns.split(' ');

                let leftWidth = parseFloat(cols[0]);
                let centerWidth = parseFloat(cols[2]);
                let rightWidth = parseFloat(cols[4]);

                const movementX = e.movementX;

                if (currentResizer === 'left') {
                    const newLeft = leftWidth + movementX;
                    const newCenter = centerWidth - movementX;
                    if (newLeft > 180 && newCenter > 200) {
                        grid.style.gridTemplateColumns = `${newLeft}px 12px ${newCenter}px 12px ${rightWidth}px`;
                    }
                } else if (currentResizer === 'right') {
                    const newCenter = centerWidth + movementX;
                    const newRight = rightWidth - movementX;
                    if (newCenter > 200 && newRight > 180) {
                        grid.style.gridTemplateColumns = `${leftWidth}px 12px ${newCenter}px 12px ${newRight}px`;
                    }
                }
            });

            window.addEventListener('mouseup', () => {
                if (isResizing) {
                    isResizing = false;
                    currentResizer = null;
                    document.body.classList.remove('resizing');
                }
            });
        }

        init();
        initResizers();
    </script>
</body>
</html>
