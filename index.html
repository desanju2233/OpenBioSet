<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBioSet Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <div class="max-w-4xl mx-auto p-6">
        <header class="mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight text-blue-600">OpenBioSet</h1>
            <p class="text-sm text-gray-500 mt-1">Dataset Explorer</p>
        </header>

        <div class="relative mb-6">
            <input type="text" id="search" oninput="filterFolders()" autocomplete="off"
                   placeholder="Search folders..." 
                   class="w-full px-4 py-3 rounded-lg border border-gray-300 shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            
            <ul id="recommendations" class="absolute z-10 w-full bg-white mt-1 rounded-lg shadow-lg border border-gray-200 max-h-60 overflow-y-auto empty:hidden"></ul>
        </div>

        <main id="content-view" class="hidden space-y-6">
            <h2 id="folder-title" class="text-xl font-bold text-gray-800 border-b pb-2"></h2>
            
            <div class="grid grid-cols-1 gap-6">
                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                    <h3 class="text-sm font-semibold uppercase text-gray-400 mb-2">description (.txt)</h3>
                    <pre id="txt-content" class="bg-gray-50 p-4 rounded-lg overflow-x-auto text-sm text-gray-700 font-mono border border-gray-100 whitespace-pre-wrap">Loading...</pre>
                </div>

                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                    <h3 class="text-sm font-semibold uppercase text-gray-400 mb-2">layout </h3>
                    <div class="bg-gray-50 rounded-lg p-4 flex justify-center border border-gray-100">
                        <img id="img-content" class="max-h-96 w-auto rounded object-contain" alt="Folder visual representation" />
                    </div>
                </div>

                <div class="bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                    <h3 class="text-sm font-semibold uppercase text-gray-400 mb-2">output (.ir)</h3>
                    <pre id="ir-content" class="bg-gray-50 p-4 rounded-lg overflow-x-auto text-sm text-gray-700 font-mono border border-gray-100 whitespace-pre-wrap">Loading...</pre>
                </div>
            </div>
        </main>
    </div>

    <script>
        let allFolders = [];

        async function init() {
            const searchBar = document.getElementById('search');
            try {
                // Fetching from the absolute root of the site
                const response = await fetch('/Dataset/folders.json');
                
                if (!response.ok) {
                    throw new Error(`Server returned ${response.status} - folders.json not found`);
                }
                
                allFolders = await response.json();
                allFolders.sort();
                searchBar.placeholder = `Search ${allFolders.length} folders...`;

            } catch (error) {
                console.error("Error loading folders:", error);
                searchBar.placeholder = "Error: folders.json not found! Check Console.";
                searchBar.disabled = true; // Disable if broken
            }
        }

        function filterFolders() {
            const query = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('recommendations');
            list.innerHTML = ''; 

            if (!query) return; 

            const matches = allFolders.filter(name => name.toLowerCase().includes(query));
            
            matches.forEach(name => {
                const li = document.createElement('li');
                li.textContent = name;
                li.className = "px-4 py-2 cursor-pointer hover:bg-gray-100 border-b border-gray-100 last:border-none";
                li.onclick = () => loadFiles(name);
                list.appendChild(li);
            });
        }

        async function loadFiles(folderName) {
            document.getElementById('search').value = folderName;
            document.getElementById('recommendations').innerHTML = ''; 
            document.getElementById('content-view').classList.remove('hidden');
            document.getElementById('folder-title').textContent = folderName;
            
            document.getElementById('txt-content').textContent = 'Loading text...';
            document.getElementById('img-content').src = '';
            document.getElementById('img-content').style.display = 'none'; 
            document.getElementById('ir-content').textContent = 'Loading routing...';

            try {
                // Fetch Text File
                const txtRes = await fetch(`/Dataset/${folderName}/description.txt`);
                document.getElementById('txt-content').textContent = txtRes.ok 
                    ? await txtRes.text() 
                    : `Error: Could not find /Dataset/${folderName}/description.txt`;

                // Fetch IR File
                const irRes = await fetch(`/Dataset/${folderName}/output.ir`);
                document.getElementById('ir-content').textContent = irRes.ok 
                    ? await irRes.text() 
                    : `Error: Could not find /Dataset/${folderName}/output.ir`;

                // Load Image
                const imgEl = document.getElementById('img-content');
                // Ensure your image matches this exact name and extension!
                imgEl.src = `/Dataset/${folderName}/layout.png`; 
                imgEl.onload = () => { imgEl.style.display = 'block'; };
                imgEl.onerror = () => { imgEl.style.display = 'none'; };

            } catch (error) {
                console.error("Error fetching local files:", error);
            }
        }

        init();
    </script>
    
</body>
</html>
